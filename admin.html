<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — SALTUS Vol. I</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-l: #E8C96A;
  --black: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --line: #2a2a2a;
  --white: #ffffff;
  --gray: #888888;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; }

/* ── GATE ── */
#gate {
  position: fixed; inset: 0; background: var(--black);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100;
}
.gate-logo { font-size: 10px; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; }
.gate-sub { font-size: 10px; letter-spacing: 2px; color: var(--gray); text-transform: uppercase; }
.gate-input {
  width: 280px; background: var(--surface); border: 1px solid var(--line);
  color: var(--white); font-family: inherit; font-size: 16px; letter-spacing: 4px;
  text-align: center; padding: 14px; outline: none;
}
.gate-input:focus { border-color: var(--gold); }
.gate-btn {
  width: 280px; background: var(--gold); color: var(--black); border: none;
  font-family: inherit; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  font-weight: 700; padding: 14px; cursor: pointer;
}
.gate-btn:hover { background: var(--gold-l); }
.gate-err { font-size: 11px; color: var(--red); min-height: 16px; }

/* ── DASHBOARD ── */
#dashboard { display: none; min-height: 100vh; }

.topbar {
  background: var(--surface); border-bottom: 1px solid var(--line);
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-logo { font-size: 10px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }
.topbar-right { display: flex; align-items: center; gap: 20px; }
.topbar-time { font-size: 11px; color: var(--gray); }
.topbar-logout {
  background: transparent; border: 1px solid var(--line); color: var(--gray);
  font-family: inherit; font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  padding: 6px 14px; cursor: pointer; transition: border-color .2s, color .2s;
}
.topbar-logout:hover { border-color: var(--white); color: var(--white); }

.main { padding: 32px; max-width: 1400px; margin: 0 auto; }

/* ── SECTION TITLE ── */
.section-title {
  font-size: 10px; letter-spacing: 4px; color: var(--gold);
  text-transform: uppercase; margin-bottom: 20px; margin-top: 40px;
  padding-bottom: 10px; border-bottom: 1px solid var(--line);
}
.section-title:first-child { margin-top: 0; }

/* ── SUMMARY CARDS ── */
.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 4px; }
@media(max-width:900px){ .cards { grid-template-columns: repeat(2,1fr); } }
@media(max-width:500px){ .cards { grid-template-columns: 1fr; } }

.card {
  background: var(--surface); border: 1px solid var(--line);
  padding: 24px 28px; position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.card-label { font-size: 9px; letter-spacing: 3px; color: var(--gray); text-transform: uppercase; margin-bottom: 12px; }
.card-value { font-size: 36px; font-weight: 700; color: var(--white); line-height: 1; }
.card-value.gold { color: var(--gold); }
.card-sub { font-size: 11px; color: var(--gray); margin-top: 8px; }
.card-bar { height: 3px; background: var(--line); margin-top: 12px; border-radius: 2px; overflow: hidden; }
.card-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .6s ease; }

/* ── TABLE ── */
.table-controls {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 220px; background: var(--surface); border: 1px solid var(--line);
  color: var(--white); font-family: inherit; font-size: 13px;
  padding: 10px 14px; outline: none;
}
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: #444; }
.count-label { font-size: 11px; color: var(--gray); white-space: nowrap; }

.table-wrap { overflow-x: auto; border: 1px solid var(--line); }
table { width: 100%; border-collapse: collapse; white-space: nowrap; }
thead { background: var(--surface2); }
th {
  padding: 12px 16px; text-align: left;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray);
  border-bottom: 1px solid var(--line); cursor: pointer; user-select: none;
}
th:hover { color: var(--gold); }
th.sorted { color: var(--gold); }
th .sort-arrow { margin-left: 4px; opacity: .5; }
th.sorted .sort-arrow { opacity: 1; }
td {
  padding: 11px 16px; border-bottom: 1px solid #1a1a1a;
  font-size: 13px; color: rgba(255,255,255,.85);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.02); }
td.num { color: var(--gray); font-size: 11px; }
td.conf { font-family: monospace; font-size: 12px; color: var(--gold); letter-spacing: 1px; }
td.money { color: var(--green); }

.badge {
  display: inline-block; font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  font-weight: 700; padding: 3px 9px; border-radius: 2px;
}
.badge-paid    { background: rgba(34,197,94,.15);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
.badge-pending { background: rgba(234,179,8,.12);  color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
.badge-usado   { background: rgba(239,68,68,.12);  color: var(--red);    border: 1px solid rgba(239,68,68,.3); }
.badge-other   { background: rgba(136,136,136,.1); color: var(--gray);   border: 1px solid #333; }

.empty-row td { text-align: center; color: var(--gray); padding: 40px; }

/* ── MAP ── */
.map-grid {
  display: flex; flex-direction: column; gap: 20px;
}
.map-zone { }
.map-zone-label {
  font-size: 9px; letter-spacing: 3px; color: var(--gray);
  text-transform: uppercase; margin-bottom: 10px;
}
.map-tables { display: flex; flex-wrap: wrap; gap: 8px; }

.map-table {
  width: 56px; height: 56px; border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: default; position: relative; transition: transform .1s;
  border: 1px solid transparent;
}
.map-table:hover { transform: scale(1.1); z-index: 10; }
.map-table.available { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.35); }
.map-table.sold      { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); }
.map-table.pending   { background: rgba(234,179,8,.12); border-color: rgba(234,179,8,.35); }
.map-table.vip-avail { background: rgba(201,168,76,.1); border-color: rgba(201,168,76,.4); }
.map-table.vip-sold  { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); }

.map-table-n {
  font-size: 16px; font-weight: 700;
  color: var(--white);
}
.map-table.available .map-table-n { color: var(--green); }
.map-table.sold      .map-table-n { color: var(--red); }
.map-table.pending   .map-table-n { color: var(--yellow); }
.map-table.vip-avail .map-table-n { color: var(--gold); }
.map-table.vip-sold  .map-table-n { color: var(--red); }

.map-table-seats { font-size: 9px; color: var(--gray); }

.map-tooltip {
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #1e1e1e; border: 1px solid var(--line);
  padding: 8px 12px; white-space: nowrap; pointer-events: none;
  font-size: 11px; color: var(--white); z-index: 100;
  opacity: 0; transition: opacity .15s;
  min-width: 140px; text-align: center;
}
.map-table:hover .map-tooltip { opacity: 1; }

.map-legend { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
.map-leg { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--gray); }
.map-leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ── EXPORT ── */
.export-row { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-export {
  background: var(--gold); color: var(--black); border: none;
  font-family: inherit; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700; padding: 13px 28px; cursor: pointer; transition: background .2s;
}
.btn-export:hover { background: var(--gold-l); }
.btn-export-outline {
  background: transparent; color: var(--gold); border: 1px solid var(--gold);
  font-family: inherit; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  font-weight: 700; padding: 13px 28px; cursor: pointer; transition: background .2s, color .2s;
}
.btn-export-outline:hover { background: var(--gold); color: var(--black); }

/* ── LOADING ── */
.loading { text-align: center; padding: 60px; color: var(--gray); font-size: 12px; letter-spacing: 2px; }
.spinner-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
.spinner { width: 28px; height: 28px; border: 2px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-logo">SALTUS Vol. I</div>
  <div class="gate-sub">Panel de administrador</div>
  <input class="gate-input" id="gateInput" type="password" placeholder="Contraseña admin"
    onkeydown="if(event.key==='Enter') gateSubmit()">
  <button class="gate-btn" onclick="gateSubmit()">Entrar</button>
  <div class="gate-err" id="gateErr"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="topbar">
    <div class="topbar-logo">SALTUS — Admin</div>
    <div class="topbar-right">
      <span class="topbar-time" id="topbarTime"></span>
      <button class="topbar-logout" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="main" id="mainContent">
    <div class="loading" id="loadingState">
      <div class="spinner-wrap"><div class="spinner"></div></div>
      Cargando órdenes…
    </div>
  </div>

</div>

<script>
const ADMIN_PASS = 'SALTUS2025admin';
const CAPACITY = { general: 162, vip: 30, total: 192 };

// Table definitions (mesa number → seat count, type)
const TABLES = [
  {n:39,type:'vip',seats:5},{n:38,type:'vip',seats:5},{n:37,type:'vip',seats:5},
  {n:34,type:'vip',seats:5},{n:35,type:'vip',seats:5},{n:36,type:'vip',seats:5},
  {n:33,type:'gen',seats:5},{n:32,type:'gen',seats:5},{n:31,type:'gen',seats:5},
  {n:22,type:'gen',seats:5},{n:21,type:'gen',seats:6},{n:20,type:'gen',seats:5},
  {n:23,type:'gen',seats:4},{n:24,type:'gen',seats:4},
  {n:30,type:'gen',seats:5},{n:29,type:'gen',seats:5},{n:28,type:'gen',seats:5},
  {n:27,type:'gen',seats:7},{n:25,type:'gen',seats:5},{n:26,type:'gen',seats:7},
  {n:19,type:'gen',seats:8},{n:18,type:'gen',seats:6},{n:17,type:'gen',seats:6},{n:16,type:'gen',seats:6},
  {n:12,type:'gen',seats:4},{n:13,type:'gen',seats:4},{n:14,type:'gen',seats:4},{n:15,type:'gen',seats:4},
  {n:7,type:'gen',seats:5},{n:6,type:'gen',seats:5},
  {n:11,type:'gen',seats:4},{n:10,type:'gen',seats:4},{n:9,type:'gen',seats:4},{n:8,type:'gen',seats:4},
  {n:5,type:'gen',seats:5},
  {n:1,type:'gen',seats:4},{n:2,type:'gen',seats:4},{n:3,type:'gen',seats:4},{n:4,type:'gen',seats:4},
];

let allOrders = [];
let filtered  = [];
let sortCol   = 'created_at';
let sortAsc   = false;
let searchQ   = '';

// ── Auth ──────────────────────────────────────────────────────────────────────
function gateSubmit() {
  const val = document.getElementById('gateInput').value;
  if (val === ADMIN_PASS) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    startClock();
    loadOrders();
  } else {
    const err = document.getElementById('gateErr');
    err.textContent = 'Contraseña incorrecta';
    document.getElementById('gateInput').value = '';
    setTimeout(() => err.textContent = '', 2500);
  }
}

function logout() {
  location.reload();
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function startClock() {
  const el = document.getElementById('topbarTime');
  const tick = () => {
    el.textContent = new Date().toLocaleString('es-MX', {
      dateStyle: 'medium', timeStyle: 'short'
    });
  };
  tick();
  setInterval(tick, 60000);
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadOrders() {
  try {
    const res = await fetch('/api/get-orders', {
      headers: { 'x-admin-password': ADMIN_PASS }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allOrders = data.orders || [];
    renderDashboard();
  } catch (err) {
    document.getElementById('mainContent').innerHTML =
      `<div class="loading" style="color:var(--red)">Error al cargar: ${err.message}<br><br>
       <button class="btn-export" onclick="loadOrders()">Reintentar</button></div>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderDashboard() {
  applyFilter();

  const content = document.getElementById('mainContent');
  content.innerHTML = `
    ${renderSummary()}
    ${renderTable()}
    ${renderMap()}
    ${renderExport()}
  `;

  attachTableEvents();
}

// ── 1. Summary ────────────────────────────────────────────────────────────────
function renderSummary() {
  const paid = allOrders.filter(o => o.status === 'paid' || o.status === 'usado');
  const totalBoletos = paid.reduce((s, o) => s + (Number(o.cantidad) || 0), 0);
  const totalMXN = paid.reduce((s, o) => s + (Number(o.total) || 0), 0);

  const genSold = paid.filter(o => o.tipo_boleto === 'general')
                      .reduce((s, o) => s + (Number(o.cantidad) || 0), 0);
  const vipSold = paid.filter(o => o.tipo_boleto === 'vip')
                      .reduce((s, o) => s + (Number(o.cantidad) || 0), 0);

  const genPct = Math.min(100, Math.round(genSold / CAPACITY.general * 100));
  const vipPct = Math.min(100, Math.round(vipSold / CAPACITY.vip * 100));

  return `
  <div class="section-title">Resumen general</div>
  <div class="cards">
    <div class="card">
      <div class="card-label">Boletos vendidos</div>
      <div class="card-value">${totalBoletos}</div>
      <div class="card-sub">de ${CAPACITY.total} disponibles</div>
      <div class="card-bar"><div class="card-bar-fill" style="width:${Math.round(totalBoletos/CAPACITY.total*100)}%"></div></div>
    </div>
    <div class="card">
      <div class="card-label">Total recaudado</div>
      <div class="card-value gold">$${totalMXN.toLocaleString('es-MX', {minimumFractionDigits:0})}</div>
      <div class="card-sub">MXN</div>
    </div>
    <div class="card">
      <div class="card-label">General vendidos</div>
      <div class="card-value">${genSold}</div>
      <div class="card-sub">de ${CAPACITY.general} · ${genPct}%</div>
      <div class="card-bar"><div class="card-bar-fill" style="width:${genPct}%"></div></div>
    </div>
    <div class="card">
      <div class="card-label">VIP vendidos</div>
      <div class="card-value">${vipSold}</div>
      <div class="card-sub">de ${CAPACITY.vip} · ${vipPct}%</div>
      <div class="card-bar"><div class="card-bar-fill" style="width:${vipPct}%"></div></div>
    </div>
  </div>`;
}

// ── 2. Table ──────────────────────────────────────────────────────────────────
function applyFilter() {
  const q = searchQ.toLowerCase();
  filtered = allOrders.filter(o => {
    if (!q) return true;
    const name = `${o.Nombre || ''} ${o.Apellido || ''}`.toLowerCase();
    const email = (o.Email || '').toLowerCase();
    return name.includes(q) || email.includes(q);
  });
  filtered.sort((a, b) => {
    let va = a[sortCol] ?? '';
    let vb = b[sortCol] ?? '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function renderTable() {
  const cols = [
    { key: '#',           label: '#',          nosort: true },
    { key: 'Nombre',      label: 'Nombre' },
    { key: 'Email',       label: 'Email' },
    { key: 'mesa',        label: 'Mesa' },
    { key: 'tipo_boleto', label: 'Tipo' },
    { key: 'cantidad',    label: 'Cant.' },
    { key: 'total',       label: 'Total' },
    { key: 'status',      label: 'Status' },
    { key: 'created_at',  label: 'Fecha' },
    { key: 'confirmation',label: 'Código' },
  ];

  const headers = cols.map(c => {
    if (c.nosort) return `<th>${c.label}</th>`;
    const isSorted = sortCol === c.key;
    const arrow = isSorted ? (sortAsc ? '↑' : '↓') : '↕';
    return `<th class="${isSorted ? 'sorted' : ''}" data-col="${c.key}">
      ${c.label} <span class="sort-arrow">${arrow}</span>
    </th>`;
  }).join('');

  const rows = filtered.length === 0
    ? `<tr class="empty-row"><td colspan="10">No hay órdenes que coincidan</td></tr>`
    : filtered.map((o, i) => {
        const nombre = `${o.Nombre || ''} ${o.Apellido || ''}`.trim() || '—';
        const fecha  = o.created_at
          ? new Date(o.created_at).toLocaleString('es-MX', { dateStyle:'short', timeStyle:'short' })
          : '—';
        const total = o.total != null
          ? '$' + Number(o.total).toLocaleString('es-MX', {minimumFractionDigits:0}) : '—';
        return `<tr>
          <td class="num">${i + 1}</td>
          <td>${escHtml(nombre)}</td>
          <td style="color:var(--gray)">${escHtml(o.Email || '—')}</td>
          <td>${o.mesa ? 'Mesa #' + o.mesa : '—'}</td>
          <td>${o.tipo_boleto ? capitalize(o.tipo_boleto) : '—'}</td>
          <td>${o.cantidad ?? '—'}</td>
          <td class="money">${total}</td>
          <td>${badge(o.status)}</td>
          <td style="color:var(--gray);font-size:12px">${fecha}</td>
          <td class="conf">${o.confirmation || '—'}</td>
        </tr>`;
      }).join('');

  return `
  <div class="section-title" style="margin-top:48px">
    Compradores <span style="color:var(--gray);font-weight:400">(${allOrders.length} total)</span>
  </div>
  <div class="table-controls">
    <input class="search-input" id="searchInput" type="text"
      placeholder="Buscar por nombre o email…" value="${escHtml(searchQ)}"
      oninput="onSearch(this.value)">
    <span class="count-label" id="countLabel">Mostrando ${filtered.length} de ${allOrders.length}</span>
  </div>
  <div class="table-wrap">
    <table id="ordersTable">
      <thead><tr>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function attachTableEvents() {
  document.querySelectorAll('#ordersTable th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc;
      else { sortCol = col; sortAsc = col !== 'created_at'; }
      applyFilter();
      refreshTable();
    });
  });
}

function refreshTable() {
  const wrap = document.querySelector('.table-wrap');
  const controls = document.querySelector('.table-controls');
  if (!wrap || !controls) return;

  const cols = [
    { key: '#', label: '#', nosort: true },
    { key: 'Nombre', label: 'Nombre' },
    { key: 'Email', label: 'Email' },
    { key: 'mesa', label: 'Mesa' },
    { key: 'tipo_boleto', label: 'Tipo' },
    { key: 'cantidad', label: 'Cant.' },
    { key: 'total', label: 'Total' },
    { key: 'status', label: 'Status' },
    { key: 'created_at', label: 'Fecha' },
    { key: 'confirmation', label: 'Código' },
  ];

  const headers = cols.map(c => {
    if (c.nosort) return `<th>${c.label}</th>`;
    const isSorted = sortCol === c.key;
    const arrow = isSorted ? (sortAsc ? '↑' : '↓') : '↕';
    return `<th class="${isSorted ? 'sorted' : ''}" data-col="${c.key}">
      ${c.label} <span class="sort-arrow">${arrow}</span>
    </th>`;
  }).join('');

  const rows = filtered.length === 0
    ? `<tr class="empty-row"><td colspan="10">No hay órdenes que coincidan</td></tr>`
    : filtered.map((o, i) => {
        const nombre = `${o.Nombre || ''} ${o.Apellido || ''}`.trim() || '—';
        const fecha  = o.created_at
          ? new Date(o.created_at).toLocaleString('es-MX', { dateStyle:'short', timeStyle:'short' })
          : '—';
        const total = o.total != null
          ? '$' + Number(o.total).toLocaleString('es-MX', {minimumFractionDigits:0}) : '—';
        return `<tr>
          <td class="num">${i + 1}</td>
          <td>${escHtml(nombre)}</td>
          <td style="color:var(--gray)">${escHtml(o.Email || '—')}</td>
          <td>${o.mesa ? 'Mesa #' + o.mesa : '—'}</td>
          <td>${o.tipo_boleto ? capitalize(o.tipo_boleto) : '—'}</td>
          <td>${o.cantidad ?? '—'}</td>
          <td class="money">${total}</td>
          <td>${badge(o.status)}</td>
          <td style="color:var(--gray);font-size:12px">${fecha}</td>
          <td class="conf">${o.confirmation || '—'}</td>
        </tr>`;
      }).join('');

  wrap.innerHTML = `<table id="ordersTable">
    <thead><tr>${headers}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  document.getElementById('countLabel').textContent = `Mostrando ${filtered.length} de ${allOrders.length}`;
  attachTableEvents();
}

function onSearch(q) {
  searchQ = q;
  applyFilter();
  refreshTable();
}

// ── 3. Map ────────────────────────────────────────────────────────────────────
function renderMap() {
  // Build lookup: mesa number → order
  const mesaMap = {};
  allOrders.forEach(o => {
    if (o.mesa) mesaMap[Number(o.mesa)] = o;
  });

  const vipTables = TABLES.filter(t => t.type === 'vip').sort((a,b) => a.n - b.n);
  const genTables = TABLES.filter(t => t.type === 'gen').sort((a,b) => a.n - b.n);

  const renderZone = (tables) => tables.map(t => {
    const order = mesaMap[t.n];
    let cls = t.type === 'vip' ? 'vip-avail' : 'available';
    let tooltip = `${t.seats} lugares disponibles`;

    if (order) {
      const s = order.status;
      cls = (s === 'pending') ? 'pending' : (t.type === 'vip' ? 'vip-sold' : 'sold');
      const nombre = `${order.Nombre || ''} ${order.Apellido || ''}`.trim() || '—';
      tooltip = `${escHtml(nombre)}<br>${capitalize(s)}`;
    }

    return `<div class="map-table ${cls}" title="">
      <div class="map-table-n">${t.n}</div>
      <div class="map-table-seats">${t.seats}p</div>
      <div class="map-tooltip">${tooltip}</div>
    </div>`;
  }).join('');

  return `
  <div class="section-title" style="margin-top:48px">Mapa de mesas</div>
  <div class="map-grid">
    <div class="map-zone">
      <div class="map-zone-label">Palco — VIP (mesas 34–39)</div>
      <div class="map-tables">${renderZone(vipTables)}</div>
    </div>
    <div class="map-zone">
      <div class="map-zone-label">General (mesas 1–33)</div>
      <div class="map-tables">${renderZone(genTables)}</div>
    </div>
  </div>
  <div class="map-legend">
    <div class="map-leg"><div class="map-leg-dot" style="background:rgba(34,197,94,.5);border:1px solid rgba(34,197,94,.5)"></div>Disponible</div>
    <div class="map-leg"><div class="map-leg-dot" style="background:rgba(239,68,68,.4);border:1px solid rgba(239,68,68,.5)"></div>Vendida</div>
    <div class="map-leg"><div class="map-leg-dot" style="background:rgba(234,179,8,.3);border:1px solid rgba(234,179,8,.5)"></div>Pendiente</div>
    <div class="map-leg"><div class="map-leg-dot" style="background:rgba(201,168,76,.25);border:1px solid rgba(201,168,76,.5)"></div>VIP disponible</div>
  </div>`;
}

// ── 4. Export ─────────────────────────────────────────────────────────────────
function renderExport() {
  return `
  <div class="section-title" style="margin-top:48px">Exportar</div>
  <div class="export-row">
    <button class="btn-export" onclick="exportCSV()">Exportar CSV</button>
    <button class="btn-export-outline" onclick="loadOrders()">↻ Actualizar datos</button>
  </div>
  <div style="margin-top:60px"></div>`;
}

function exportCSV() {
  const cols = ['#','Nombre','Apellido','Email','Mesa','Tipo','Cantidad','Total MXN','Status','Fecha','Código'];
  const rows = allOrders.map((o, i) => [
    i + 1,
    o.Nombre || '',
    o.Apellido || '',
    o.Email || '',
    o.mesa || '',
    o.tipo_boleto || '',
    o.cantidad ?? '',
    o.total ?? '',
    o.status || '',
    o.created_at ? new Date(o.created_at).toLocaleString('es-MX') : '',
    o.confirmation || '',
  ]);

  const csv = [cols, ...rows]
    .map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `SALTUS-ordenes-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function badge(status) {
  const s = (status || '').toLowerCase();
  if (s === 'paid')    return `<span class="badge badge-paid">Pagado</span>`;
  if (s === 'pending') return `<span class="badge badge-pending">Pendiente</span>`;
  if (s === 'usado')   return `<span class="badge badge-usado">Usado</span>`;
  return `<span class="badge badge-other">${escHtml(status || '—')}</span>`;
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('gate').style.display !== 'none') {
    gateSubmit();
  }
});
</script>
