<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validar Boleto — SALTUS</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen { display: none; width: 100%; max-width: 400px; padding: 32px 24px; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 20px; }

/* Full-screen result */
.screen.result-screen {
  position: fixed;
  inset: 0;
  max-width: none;
  padding: 40px 24px;
  justify-content: center;
}
.screen.result-screen.active { display: flex; }

h1 { font-size: 11px; letter-spacing: 6px; color: #C9A84C; text-transform: uppercase; text-align: center; }
p.sub { font-size: 10px; letter-spacing: 2px; color: #666; text-transform: uppercase; text-align: center; }

input[type="password"], input[type="text"] {
  width: 100%;
  background: #111;
  border: 1px solid #333;
  color: #fff;
  font-family: inherit;
  font-size: 18px;
  letter-spacing: 4px;
  text-align: center;
  padding: 14px;
  outline: none;
}
input:focus { border-color: #C9A84C; }

.btn {
  width: 100%;
  padding: 18px;
  border: none;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 700;
  cursor: pointer;
}
.btn-gold { background: #C9A84C; color: #000; }
.btn-outline { background: transparent; border: 1px solid #C9A84C; color: #C9A84C; }
.btn-gray { background: transparent; border: 1px solid #444; color: #888; margin-top: 4px; }
.btn:active { opacity: 0.8; }

.err { font-size: 11px; letter-spacing: 1px; color: #ff4444; min-height: 16px; }

/* QR */
#qr-reader { width: 100%; border: none !important; }
#qr-reader video { width: 100% !important; height: auto !important; display: block !important; }
#qr-reader__dashboard { display: none !important; }
#qr-reader__status_span { display: none !important; }
.qr-wrap { width: 100%; border: 1px solid #333; overflow: hidden; }
.qr-hint { font-size: 10px; letter-spacing: 2px; color: #666; text-align: center; }

/* Result */
.result-icon { font-size: 80px; line-height: 1; }
.result-title { font-size: 24px; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; text-align: center; }
.result-details { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.detail-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
.detail-key { font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.detail-val { font-size: 14px; letter-spacing: 1px; }

#screenValid  { background: #003300; }
#screenInvalid { background: #330000; }

.spinner { width: 24px; height: 24px; border: 2px solid #333; border-top-color: #C9A84C; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 1. PANTALLA CONTRASEÑA -->
<div id="screenPass" class="screen active">
  <h1>SALTUS Vol. I</h1>
  <p class="sub">Acceso staff</p>
  <input type="password" id="passInput" placeholder="Contraseña"
    onkeydown="if(event.key==='Enter') checkPass()">
  <button class="btn btn-gold" onclick="checkPass()">Entrar</button>
  <div class="err" id="passErr"></div>
</div>

<!-- 2. PANTALLA PRINCIPAL -->
<div id="screenMain" class="screen">
  <h1>SALTUS Vol. I</h1>
  <p class="sub">Validador de boletos</p>
  <button class="btn btn-gold" onclick="goQR()">&#9635; &nbsp;Escanear QR</button>
  <button class="btn btn-outline" onclick="goManual()">&#9000; &nbsp;Ingresar código manual</button>
</div>

<!-- 3A. PANTALLA QR -->
<div id="screenQR" class="screen">
  <h1>ESCANEAR QR</h1>
  <div class="qr-wrap"><div id="qr-reader"></div></div>
  <div class="qr-hint" id="qrHint">Apunta la cámara al código QR</div>
  <button class="btn btn-gray" onclick="stopQR(); goMain()">Cancelar</button>
</div>

<!-- 3B. PANTALLA MANUAL -->
<div id="screenManual" class="screen">
  <h1>CÓDIGO MANUAL</h1>
  <input type="text" id="codeInput" placeholder="XXXXXXXX" maxlength="10"
    autocomplete="off" spellcheck="false"
    oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')"
    onkeydown="if(event.key==='Enter') submitManual()">
  <button class="btn btn-gold" id="submitBtn" onclick="submitManual()">Validar</button>
  <div id="manualSpinner" style="display:none"><div class="spinner"></div></div>
  <button class="btn btn-gray" onclick="goMain()">Volver</button>
</div>

<!-- 4A. RESULTADO VÁLIDO -->
<div id="screenValid" class="screen result-screen">
  <div class="result-icon">✓</div>
  <div class="result-title" style="color:#00ff66">BOLETO VÁLIDO</div>
  <div class="result-details" id="validDetails"></div>
  <button class="btn btn-gold" style="max-width:320px;margin-top:16px" onclick="goMain()">Validar otro</button>
</div>

<!-- 4B. RESULTADO INVÁLIDO -->
<div id="screenInvalid" class="screen result-screen">
  <div class="result-icon">✗</div>
  <div class="result-title" id="invalidTitle" style="color:#ff3333">BOLETO INVÁLIDO</div>
  <p id="invalidReason" class="sub" style="margin-top:8px"></p>
  <button class="btn btn-gray" style="max-width:320px;margin-top:24px" onclick="goMain()">Intentar de nuevo</button>
</div>

<script>
const PASSWORD = "SALTUS2025";

// ── Navigation ────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goMain() { show('screenMain'); }

function checkPass() {
  const val = document.getElementById('passInput').value;
  if (val === PASSWORD) {
    show('screenMain');
  } else {
    const err = document.getElementById('passErr');
    err.textContent = 'Contraseña incorrecta';
    document.getElementById('passInput').value = '';
    setTimeout(() => err.textContent = '', 2500);
  }
}

// ── QR Scanner ────────────────────────────────────────────────────────────────
let qrScanner = null;
let qrActive = false;

function goQR() {
  show('screenQR');
  document.getElementById('qrHint').textContent = 'Iniciando cámara…';

  if (qrScanner) { qrScanner.clear(); qrScanner = null; }

  qrScanner = new Html5Qrcode('qr-reader');
  qrScanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onQRSuccess,
    () => {}
  ).then(() => {
    qrActive = true;
    document.getElementById('qrHint').textContent = 'Apunta la cámara al código QR';
  }).catch(() => {
    document.getElementById('qrHint').textContent = 'No se pudo acceder a la cámara';
  });
}

function stopQR() {
  if (qrScanner && qrActive) {
    qrScanner.stop().catch(() => {});
    qrActive = false;
  }
}

function onQRSuccess(text) {
  stopQR();
  // Format: SALTUS-VOL1|CODIGO|nombre|tipo|mesa|cantidad
  const parts = text.split('|');
  const code = (parts.length >= 2 && parts[0].toUpperCase() === 'SALTUS-VOL1')
    ? parts[1].trim().toUpperCase()
    : text.trim().toUpperCase();
  runValidation(code);
}

// ── Manual ────────────────────────────────────────────────────────────────────
function goManual() {
  show('screenManual');
  document.getElementById('codeInput').value = '';
  setTimeout(() => document.getElementById('codeInput').focus(), 50);
}

async function submitManual() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (code.length < 3) return;

  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('manualSpinner');
  btn.disabled = true;
  spinner.style.display = 'block';

  await runValidation(code);

  btn.disabled = false;
  spinner.style.display = 'none';
}

// ── Validation ────────────────────────────────────────────────────────────────
async function runValidation(code) {
  try {
    const res = await fetch('/api/validate-ticket', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, password: PASSWORD }),
    });
    const data = await res.json();

    if (data.valid) {
      const details = document.getElementById('validDetails');
      const rows = [
        ['Nombre', data.nombre],
        ['Mesa', data.mesa ? 'Mesa #' + data.mesa : null],
        ['Tipo', data.tipo_boleto],
        ['Cantidad', data.cantidad],
      ].filter(([, v]) => v);

      details.innerHTML = rows.map(([k, v]) => `
        <div class="detail-row">
          <span class="detail-key">${k}</span>
          <span class="detail-val">${v}</span>
        </div>`).join('');
      show('screenValid');
    } else {
      const reason = data.reason || '';
      document.getElementById('invalidTitle').textContent =
        reason.includes('usado') ? 'BOLETO YA UTILIZADO' : 'BOLETO INVÁLIDO';
      document.getElementById('invalidReason').textContent = reason;
      show('screenInvalid');
    }
  } catch {
    document.getElementById('invalidTitle').textContent = 'ERROR DE CONEXIÓN';
    document.getElementById('invalidReason').textContent = 'No se pudo conectar al servidor';
    show('screenInvalid');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { stopQR(); goMain(); }
});
</script>
</body>
</html>
